<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Flow — Pomodoro Timer & Matrix</title>
  <meta name="description" content="A beautifully animated pomodoro timer and matrix rain animation.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Ambient background (shared) -->
  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- ====== Top-level View Switcher ====== -->
  <nav class="view-switcher" id="viewSwitcher">
    <button class="view-tab active" data-view="timer" id="tabTimer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Timer
    </button>
    <button class="view-tab" data-view="matrix" id="tabMatrix">
      <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14">
        <path d="M3 3h2v18H3zm8 0h2v18h-2zm8 0h2v18h-2zM7 3h2v8H7zm8 6h2v12h-2z" opacity="0.7"/>
      </svg>
      Matrix
    </button>
    <div class="view-indicator" id="viewIndicator"></div>
  </nav>

  <!-- ====== TIMER VIEW ====== -->
  <div class="view view-timer active" id="viewTimer">
    <div class="app" id="app">
      <!-- Header -->
      <header class="header">
        <h1 class="logo">
          <span class="logo-icon">◉</span>
          Focus Flow
        </h1>
        <div class="session-counter" id="sessionCounter">
          <span class="session-dot completed"></span>
          <span class="session-dot"></span>
          <span class="session-dot"></span>
          <span class="session-dot"></span>
        </div>
      </header>

      <!-- Mode Selector -->
      <nav class="mode-selector" id="modeSelector">
        <button class="mode-btn active" data-mode="focus" id="btnFocus">Focus</button>
        <button class="mode-btn" data-mode="short-break" id="btnShortBreak">Short Break</button>
        <button class="mode-btn" data-mode="long-break" id="btnLongBreak">Long Break</button>
        <div class="mode-indicator" id="modeIndicator"></div>
      </nav>

      <!-- Timer Display -->
      <div class="timer-container" id="timerContainer">
        <svg class="timer-ring" viewBox="0 0 260 260" id="timerRing">
          <defs>
            <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" class="gradient-stop-1"/>
              <stop offset="100%" class="gradient-stop-2"/>
            </linearGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>
          <circle class="timer-track" cx="130" cy="130" r="115"/>
          <circle class="timer-progress" cx="130" cy="130" r="115" id="timerProgress"
                  stroke="url(#progressGradient)" filter="url(#glow)"/>
          <g class="tick-marks" id="tickMarks"></g>
        </svg>
        <div class="timer-display">
          <div class="timer-time" id="timerTime">25:00</div>
          <div class="timer-label" id="timerLabel">FOCUS TIME</div>
        </div>
        <div class="particle-ring" id="particleRing"></div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="control-btn secondary" id="btnReset" title="Reset (R)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
        <button class="control-btn primary" id="btnStartPause">
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor" id="iconPlay">
            <polygon points="6,3 20,12 6,21"/>
          </svg>
          <svg class="icon-pause hidden" viewBox="0 0 24 24" fill="currentColor" id="iconPause">
            <rect x="5" y="3" width="4" height="18"/>
            <rect x="15" y="3" width="4" height="18"/>
          </svg>
        </button>
        <button class="control-btn secondary" id="btnSkip" title="Skip (S)">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5,3 15,12 5,21"/>
            <rect x="17" y="3" width="3" height="18"/>
          </svg>
        </button>
      </div>

      <!-- Quote -->
      <div class="quote-container" id="quoteContainer">
        <p class="quote" id="quote">"The secret of getting ahead is getting started."</p>
        <span class="quote-author" id="quoteAuthor">— Mark Twain</span>
      </div>

      <!-- Settings toggle -->
      <button class="settings-toggle" id="btnSettings" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>

      <!-- Settings Panel -->
      <div class="settings-panel hidden" id="settingsPanel">
        <div class="settings-backdrop" id="settingsBackdrop"></div>
        <div class="settings-content">
          <h2 class="settings-title">Settings</h2>
          <div class="setting-group">
            <label class="setting-label">Focus Duration</label>
            <div class="setting-control">
              <button class="stepper-btn" data-target="focusDuration" data-action="dec">−</button>
              <span class="setting-value" id="focusDuration">25</span>
              <span class="setting-unit">min</span>
              <button class="stepper-btn" data-target="focusDuration" data-action="inc">+</button>
            </div>
          </div>
          <div class="setting-group">
            <label class="setting-label">Short Break</label>
            <div class="setting-control">
              <button class="stepper-btn" data-target="shortBreakDuration" data-action="dec">−</button>
              <span class="setting-value" id="shortBreakDuration">5</span>
              <span class="setting-unit">min</span>
              <button class="stepper-btn" data-target="shortBreakDuration" data-action="inc">+</button>
            </div>
          </div>
          <div class="setting-group">
            <label class="setting-label">Long Break</label>
            <div class="setting-control">
              <button class="stepper-btn" data-target="longBreakDuration" data-action="dec">−</button>
              <span class="setting-value" id="longBreakDuration">15</span>
              <span class="setting-unit">min</span>
              <button class="stepper-btn" data-target="longBreakDuration" data-action="inc">+</button>
            </div>
          </div>
          <div class="setting-group">
            <label class="setting-label">Sessions before long break</label>
            <div class="setting-control">
              <button class="stepper-btn" data-target="sessionsBeforeLong" data-action="dec">−</button>
              <span class="setting-value" id="sessionsBeforeLong">4</span>
              <button class="stepper-btn" data-target="sessionsBeforeLong" data-action="inc">+</button>
            </div>
          </div>
          <div class="setting-group">
            <label class="setting-label">Sound</label>
            <div class="setting-control">
              <button class="toggle-btn active" id="soundToggle">On</button>
            </div>
          </div>
          <button class="settings-close" id="btnCloseSettings">Done</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== MATRIX VIEW ====== -->
  <div class="view view-matrix" id="viewMatrix">
    <canvas id="matrixCanvas"></canvas>

    <!-- Floating palette picker -->
    <div class="matrix-controls" id="matrixControls">
      <div class="palette-label">Color Palette</div>
      <div class="palette-grid" id="paletteGrid">
        <button class="palette-swatch active" data-palette="classic" id="swatchClassic" title="Classic Green">
          <span class="swatch-preview" style="background: linear-gradient(135deg, #00FF41, #008F11)"></span>
          <span class="swatch-name">Classic</span>
        </button>
        <button class="palette-swatch" data-palette="cyan" id="swatchCyan" title="Cyberpunk Cyan">
          <span class="swatch-preview" style="background: linear-gradient(135deg, #00FFFF, #0080FF)"></span>
          <span class="swatch-name">Cyan</span>
        </button>
        <button class="palette-swatch" data-palette="amber" id="swatchAmber" title="Retro Amber">
          <span class="swatch-preview" style="background: linear-gradient(135deg, #FFB000, #FF6600)"></span>
          <span class="swatch-name">Amber</span>
        </button>
        <button class="palette-swatch" data-palette="purple" id="swatchPurple" title="Vaporwave Purple">
          <span class="swatch-preview" style="background: linear-gradient(135deg, #BF40FF, #6C5CE7)"></span>
          <span class="swatch-name">Purple</span>
        </button>
        <button class="palette-swatch" data-palette="red" id="swatchRed" title="Red Pill">
          <span class="swatch-preview" style="background: linear-gradient(135deg, #FF3333, #CC0000)"></span>
          <span class="swatch-name">Red Pill</span>
        </button>
        <button class="palette-swatch" data-palette="rainbow" id="swatchRainbow" title="Rainbow">
          <span class="swatch-preview" style="background: linear-gradient(135deg, #FF0000, #FF7700, #FFFF00, #00FF00, #0000FF, #8B00FF)"></span>
          <span class="swatch-name">Rainbow</span>
        </button>
        <button class="palette-swatch" data-palette="pink" id="swatchPink" title="Sakura Pink">
          <span class="swatch-preview" style="background: linear-gradient(135deg, #FF69B4, #FF1493)"></span>
          <span class="swatch-name">Sakura</span>
        </button>
        <button class="palette-swatch" data-palette="ice" id="swatchIce" title="Frozen Ice">
          <span class="swatch-preview" style="background: linear-gradient(135deg, #E0FFFF, #87CEEB)"></span>
          <span class="swatch-name">Ice</span>
        </button>
      </div>

      <!-- Speed control -->
      <div class="matrix-speed">
        <span class="speed-label">Speed</span>
        <input type="range" id="matrixSpeed" min="1" max="5" value="3" class="speed-slider">
      </div>

      <!-- Density control -->
      <div class="matrix-speed">
        <span class="speed-label">Density</span>
        <input type="range" id="matrixDensity" min="1" max="5" value="3" class="speed-slider">
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
